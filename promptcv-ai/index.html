<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptCV – AI Resume Builder</title>
    <meta name="description" content="Generate a clean and modern resume quickly with PromptCV.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>PromptCV</h1>
            <p>AI Resume Builder</p>
        </header>

        <main class="app-grid">
            <section class="input-section glass-panel">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="margin-bottom: 0;">Your Details</h2>
                    <button type="button" id="auto-fill-btn" class="auto-fill-btn">Auto-Fill Sample</button>
                </div>
                <form id="resume-form">
                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="input-group">
                        <label for="skills">Skills</label>
                        <textarea id="skills" placeholder="JavaScript, React, Node.js..." rows="3" required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="education">Education</label>
                        <textarea id="education" placeholder="B.S. in Computer Science..." rows="3" required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="experience">Experience</label>
                        <textarea id="experience" placeholder="Software Engineer at TechCorp..." rows="4" required></textarea>
                    </div>

                    <button type="submit" class="generate-btn">
                        <span>Generate Resume</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
            </section>

            <section class="output-section glass-panel" id="output-section">
                <div class="empty-state" id="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <p>Your resume will appear here</p>
                </div>

                <div class="resume-preview hidden" id="resume">
                    <div class="resume-header">
                        <h2 id="out-name">John Doe</h2>
                    </div>
                    
                    <div class="resume-content">
                        <div class="resume-section">
                            <h3>Experience</h3>
                            <p id="out-experience"></p>
                        </div>

                        <div class="resume-section">
                            <h3>Education</h3>
                            <p id="out-education"></p>
                        </div>

                        <div class="resume-section">
                            <h3>Skills</h3>
                            <ul class="skills-list" id="out-skills">
                            </ul>
                        </div>
                    </div>
                </div>
                
                <button type="button" class="generate-btn download-btn" id="download-btn" style="display: none; margin-top: 2rem;">
                    <span>Download Resume</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
